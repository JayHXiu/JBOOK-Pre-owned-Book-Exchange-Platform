{% extends 'base.html' %}
{% block content %}
<div class="container col-md-6">
  <div class="card p-4">
    <h4>创建订单</h4>
    <p>{{ sell.book.book_name }} · 标价 ¥{{ sell.second_price }}</p>
    <form method="post">{% csrf_token %}
      <div class="mb-3"><label>成交价格</label><input name="deal_price" type="number" step="0.01" class="form-control" value="{{ sell.second_price }}"></div>
      <button class="btn btn-primary">确认下单</button>
    </form>
  </div>
</div>
{% endblock %}
