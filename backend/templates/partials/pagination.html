{% if page.has_other_pages %}
<nav class="mt-4">
  <ul class="pagination justify-content-center">
    {% if page.has_previous %}
    <li class="page-item"><a class="page-link" href="?{% for k,v in request.GET.items %}{% if k != 'page' %}{{ k }}={{ v }}&{% endif %}{% endfor %}page={{ page.previous_page_number }}">上一页</a></li>
    {% endif %}
    <li class="page-item disabled"><span class="page-link">{{ page.number }} / {{ page.paginator.num_pages }}</span></li>
    {% if page.has_next %}
    <li class="page-item"><a class="page-link" href="?{% for k,v in request.GET.items %}{% if k != 'page' %}{{ k }}={{ v }}&{% endif %}{% endfor %}page={{ page.next_page_number }}">下一页</a></li>
    {% endif %}
  </ul>
</nav>
{% endif %}
