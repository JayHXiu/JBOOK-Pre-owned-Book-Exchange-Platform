{% extends 'base.html' %}
{% block title %}找回密码 - JBOOK{% endblock %}
{% block content %}
<div class="container col-md-5">
  <div class="card p-4">
    <h4>找回密码</h4>
    <p class="text-muted small">输入注册账号，系统将提示后续重置方式（演示环境请联系管理员重置）。</p>
    <form method="post">{% csrf_token %}
      <div class="mb-3"><label>账号</label><input name="username" class="form-control" required></div>
      <button class="btn btn-primary">提交</button>
    </form>
    <a href="{% url 'login' %}" class="small">返回登录</a>
  </div>
</div>
{% endblock %}
