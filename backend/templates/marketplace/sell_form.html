{% extends 'base.html' %}
{% load static %}
{% block title %}发布图书 - JBOOK{% endblock %}
{% block content %}
<div class="container col-lg-8">
  <div class="card p-4 shadow-sm">
    <h4 class="mb-3">发布二手书</h4>
    <form method="post" enctype="multipart/form-data" id="sellForm" novalidate>
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">ISBN</label>
          <div class="input-group">
            <input name="isbn" id="isbn" class="form-control" required>
            <button type="button" class="btn btn-outline-primary" id="btnIsbnLookup">一键补全</button>
          </div>
        </div>
        <div class="col-md-6"><label class="form-label">书名</label><input name="book_name" id="book_name" class="form-control" required></div>
        <div class="col-md-4"><label class="form-label">作者</label><input name="author" id="author" class="form-control"></div>
        <div class="col-md-4"><label class="form-label">出版社</label><input name="publisher" id="publisher" class="form-control"></div>
        <div class="col-md-4"><label class="form-label">出版年</label><input name="pub_year" id="pub_year" type="number" class="form-control" value="2020"></div>
        <div class="col-md-4"><label class="form-label">原价</label><input name="original_price" id="original_price" type="number" step="0.01" class="form-control" value="50"></div>
        <div class="col-md-4">
          <label class="form-label">二手价</label>
          <input name="second_price" id="second_price" type="number" step="0.01" class="form-control" required>
        </div>
        <div class="col-md-4"><label class="form-label">成色 1-5</label><input name="quality" id="quality" type="number" min="1" max="5" class="form-control" value="3"></div>
        <div class="col-md-6">
          <label class="form-label">分类</label>
          <select name="cat_id" id="cat_id" class="form-select" required>
            {% for c in categories %}<option value="{{ c.cat_id }}">{{ c.cat_name }}</option>{% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">封面图 (jpg/png, max 2MB)</label>
          <input type="file" name="cover_img" id="cover_img" class="form-control" accept="image/*">
          <img id="coverPreview" class="img-preview mt-2 d-none" alt="">
        </div>
        <div class="col-12">
          <div class="alert alert-info" id="priceHintBox">
            <button type="button" class="btn btn-sm btn-info" id="btnSuggestPrice"><i class="fa-solid fa-wand-magic-sparkles"></i> 智能定价</button>
            <span id="priceHint" class="ms-2"></span>
          </div>
        </div>
        <div class="col-12"><label class="form-label">简介</label><textarea name="book_desc" id="book_desc" class="form-control" rows="4"></textarea></div>
      </div>
      <div class="mt-4 d-flex gap-2">
        <button type="submit" class="btn btn-primary" id="btnSubmit"><span class="submit-text">提交发布</span></button>
        <a href="{% url 'book_list' %}" class="btn btn-light">取消</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>initSellForm();</script>
{% endblock %}
