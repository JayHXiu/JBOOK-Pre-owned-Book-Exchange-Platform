{% extends 'base.html' %}
{% block title %}编辑在售图书 - JBOOK{% endblock %}
{% block content %}
<div class="container col-lg-8">
  <div class="card p-4 shadow-sm">
    <h4 class="mb-3">编辑 · {{ sell.book.book_name }}</h4>
    <form method="post" id="sellEditForm">{% csrf_token %}
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">二手价</label>
          <input name="second_price" type="number" step="0.01" class="form-control" value="{{ sell.second_price }}" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">成色 1-5</label>
          <input name="quality" type="number" min="1" max="5" class="form-control" value="{{ sell.quality }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">状态</label>
          <select name="status" class="form-select">
            <option value="1" {% if sell.status == 1 %}selected{% endif %}>在售</option>
            <option value="0" {% if sell.status == 0 %}selected{% endif %}>下架</option>
          </select>
        </div>
        <div class="col-12">
          <label class="form-label">简介</label>
          <textarea name="book_desc" class="form-control" rows="4">{{ sell.book.book_desc }}</textarea>
        </div>
      </div>
      <div class="mt-4">
        <button class="btn btn-primary">保存</button>
        <a href="{% url 'book_detail' sell.sell_id %}" class="btn btn-light">返回详情</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
